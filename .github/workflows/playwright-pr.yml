name: 🎭 Playwright PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright-pr:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🌍 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🧪 Detect Changed Playwright Tests
        id: changed
        shell: bash
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep 'src/tests/.*\.test\.ts$' || true)

          echo "Changed files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "tests=" >> $GITHUB_OUTPUT
          else
            echo "tests=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: 🎭 Run Changed Playwright Tests
        id: playwright
        if: steps.changed.outputs.tests != ''
        continue-on-error: true
        shell: bash
        run: |
          for file in ${{ steps.changed.outputs.tests }}
          do
            echo "Running $file"
            npx playwright test "$file"
          done

      - name: 📤 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: 🐍 Setup Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 📄 Generate Summary
        if: always()
        run: python parse_playwright_report.py

      - name: 💬 Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            if (!fs.existsSync('test-summary.md')) {
              console.log("No summary found.");
              return;
            }

            const body = fs.readFileSync('test-summary.md','utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: ❌ Fail PR if Tests Failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
